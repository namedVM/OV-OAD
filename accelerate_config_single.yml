# ─────────────────────────────────────────────────────────────────────────────
# Accelerate 单卡配置（无 NCCL，无多进程）
#
# 用途：本地调试、WSL2 开发、无法使用 NCCL 的环境（如部分 WSL2 驱动版本）
#
# 使用方式：
#   accelerate launch --config_file accelerate_config_single.yml train.py \
#       --config configs/train.yml
#
# 或者最简单的方式（完全绕开 accelerate launch）：
#   python train.py --config configs/train.yml --mixed-precision no
# ─────────────────────────────────────────────────────────────────────────────

compute_environment: LOCAL_MACHINE
distributed_type: NO          # 单进程，不初始化 torch.distributed / NCCL

num_processes: 1
gpu_ids: "0"                  # 指定使用第 0 张卡；可改为其他 id

machine_rank: 0
main_process_ip: null
main_process_port: 29500
num_machines: 1

# 单卡调试推荐 no，减少精度相关干扰；硬件支持时可改为 fp16/bf16
mixed_precision: no

dynamo_backend: NO
downcast_bf16: 'no'
same_network: true
use_cpu: false
